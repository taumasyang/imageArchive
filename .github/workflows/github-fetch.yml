name: Fetch

on:
  schedule:
    - cron: '0 5 * * *'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure Git
        run: |
          git config user.name tauyoung
          git config user.email tauyoung@icloud.com
      - name: Ensure xmllint and zsh
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libxml2-utils zsh
      - name: Fetch
        run: ./fetch.zsh
